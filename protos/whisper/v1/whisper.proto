syntax = "proto3";
package whisper.v1;

service Whisper {
  // Full transcription pipeline: audio → segments with token-level detail.
  rpc Transcribe(TranscribeRequest) returns (TranscribeResponse);

  // Detect the spoken language from the audio.
  rpc DetectLanguage(DetectLanguageRequest) returns (DetectLanguageResponse);

  // Return model metadata and capabilities.
  rpc GetModelInfo(GetModelInfoRequest) returns (GetModelInfoResponse);

  // Voice Activity Detection on raw audio.
  rpc DetectVAD(DetectVADRequest) returns (DetectVADResponse);

  // Return whisper.cpp version and system info.
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);
}

// --- Transcribe ---

message TranscribeRequest {
  bytes audio = 1;              // PCM float32 LE, 16 kHz, mono
  string model_path = 2;       // Path to the .bin model file

  // Decoding params (all optional — defaults to whisper_full_default_params GREEDY)
  string language = 3;         // BCP-47 or "" for auto-detect
  bool translate = 4;          // Translate to English
  bool token_timestamps = 5;   // Enable token-level timestamps
  bool single_segment = 6;     // Force single-segment output (streaming)
  bool no_context = 7;         // Disable past-transcription context
  int32 offset_ms = 8;         // Start offset in ms
  int32 duration_ms = 9;       // Duration to process (0 = all)
  int32 max_len = 10;          // Max segment length in characters (0 = no limit)
  int32 max_tokens = 11;       // Max tokens per segment (0 = no limit)
  bool split_on_word = 12;     // Split on word boundary (with max_len)
  float temperature = 13;      // Decoding temperature (0.0 = greedy)
  int32 beam_size = 14;        // Beam size (0 = greedy, >0 = beam search)
  int32 best_of = 15;          // Best-of for greedy sampling
  string initial_prompt = 16;  // Prompt text prepended to decoder
  bool suppress_blank = 17;    // Suppress blank outputs
  bool suppress_nst = 18;      // Suppress non-speech tokens
  int32 n_threads = 19;        // Number of threads (0 = auto)
  bool tdrz_enable = 20;       // Enable tinydiarize speaker turn detection
  string suppress_regex = 21;  // Regex to suppress matching tokens

  // VAD pre-filtering
  bool vad_enabled = 22;       // Enable VAD before transcription
  string vad_model_path = 23;  // Path to VAD model file
}

message TranscribeResponse {
  repeated Segment segments = 1;
  string detected_language = 2;
  Timings timings = 3;
}

message Segment {
  int32 index = 1;
  int64 t0 = 2;                  // Start time (10 ms units, whisper convention)
  int64 t1 = 3;                  // End time
  string text = 4;
  bool speaker_turn_next = 5;    // tinydiarize flag
  float no_speech_prob = 6;
  repeated Token tokens = 7;
}

message Token {
  int32 id = 1;
  string text = 2;
  float p = 3;                   // Probability
  float plog = 4;                // Log probability
  int64 t0 = 5;                  // Token start time
  int64 t1 = 6;                  // Token end time
  int64 t_dtw = 7;               // DTW timestamp (experimental)
  float vlen = 8;                // Voice length
}

message Timings {
  float sample_ms = 1;
  float encode_ms = 2;
  float decode_ms = 3;
  float batchd_ms = 4;
  float prompt_ms = 5;
}

// --- DetectLanguage ---

message DetectLanguageRequest {
  bytes audio = 1;
  string model_path = 2;
  int32 offset_ms = 3;
  int32 n_threads = 4;
}

message DetectLanguageResponse {
  string language = 1;
  repeated LanguageProb probs = 2;
}

message LanguageProb {
  string language = 1;
  float probability = 2;
}

// --- GetModelInfo ---

message GetModelInfoRequest {
  string model_path = 1;
}

message GetModelInfoResponse {
  string model_type = 1;         // "tiny", "base", "small", etc.
  bool multilingual = 2;
  int32 n_vocab = 3;
  int32 n_audio_ctx = 4;
  int32 n_audio_state = 5;
  int32 n_audio_head = 6;
  int32 n_audio_layer = 7;
  int32 n_text_ctx = 8;
  int32 n_text_state = 9;
  int32 n_text_head = 10;
  int32 n_text_layer = 11;
  int32 n_mels = 12;
  int32 ftype = 13;
}

// --- DetectVAD ---

message DetectVADRequest {
  bytes audio = 1;
  string vad_model_path = 2;
  float threshold = 3;
  int32 min_speech_duration_ms = 4;
  int32 min_silence_duration_ms = 5;
  float max_speech_duration_s = 6;
  int32 speech_pad_ms = 7;
}

message DetectVADResponse {
  bool speech_detected = 1;
  repeated VADSegment segments = 2;
}

message VADSegment {
  float t0 = 1;                  // Start time (seconds)
  float t1 = 2;                  // End time (seconds)
}

// --- GetVersion ---

message GetVersionRequest {}

message GetVersionResponse {
  string version = 1;
  string system_info = 2;
}
