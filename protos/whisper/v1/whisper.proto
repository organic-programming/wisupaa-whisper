syntax = "proto3";
package whisper.v1;

service Whisper {
  // Full transcription pipeline: audio to segments with token-level detail.
  // @example {"audio":"AAAAAA==","model_path":"models/ggml-base.bin","language":"fr","token_timestamps":true}
  rpc Transcribe(TranscribeRequest) returns (TranscribeResponse);

  // Detect the spoken language from the audio.
  // @example {"audio":"AAAAAA==","model_path":"models/ggml-base.bin","offset_ms":0}
  rpc DetectLanguage(DetectLanguageRequest) returns (DetectLanguageResponse);

  // Return model metadata and capabilities.
  // @example {"model_path":"models/ggml-base.bin"}
  rpc GetModelInfo(GetModelInfoRequest) returns (GetModelInfoResponse);

  // Voice Activity Detection on raw audio.
  // @example {"audio":"AAAAAA==","vad_model_path":"models/ggml-silero-v5.1.2.bin","threshold":0.5}
  rpc DetectVAD(DetectVADRequest) returns (DetectVADResponse);

  // Return whisper.cpp version and system info.
  // @example {}
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);
}

// --- Transcribe ---

message TranscribeRequest {
  // PCM float32 little-endian audio sampled at 16 kHz mono.
  // @required
  // @example "AAAAAA=="
  bytes audio = 1;

  // Path to the whisper model file on disk.
  // @required
  // @example "models/ggml-base.bin"
  string model_path = 2;

  // BCP-47 language code or empty string to auto-detect.
  // @example "fr"
  string language = 3;

  // Translate the result to English.
  // @example false
  bool translate = 4;

  // Include token-level timestamps in the response.
  // @example true
  bool token_timestamps = 5;

  // Force a single output segment for streaming-style use.
  // @example false
  bool single_segment = 6;

  // Disable past-transcription context.
  // @example true
  bool no_context = 7;

  // Start offset in milliseconds.
  // @example 30000
  int32 offset_ms = 8;

  // Duration to process in milliseconds. Use 0 for the full buffer.
  // @example 15000
  int32 duration_ms = 9;

  // Maximum segment length in characters. Use 0 for no limit.
  // @example 42
  int32 max_len = 10;

  // Maximum tokens per segment. Use 0 for no limit.
  // @example 96
  int32 max_tokens = 11;

  // Split segments on word boundaries when `max_len` is set.
  // @example true
  bool split_on_word = 12;

  // Decoder temperature. Use 0.0 for greedy decoding.
  // @example 0.2
  float temperature = 13;

  // Beam size. Use 0 for greedy decoding.
  // @example 5
  int32 beam_size = 14;

  // Best-of value for greedy sampling.
  // @example 3
  int32 best_of = 15;

  // Prompt text prepended to the decoder context.
  // @example "Interview about climate policy."
  string initial_prompt = 16;

  // Suppress blank outputs.
  // @example true
  bool suppress_blank = 17;

  // Suppress non-speech tokens.
  // @example true
  bool suppress_nst = 18;

  // Number of decoding threads. Use 0 for automatic selection.
  // @example 8
  int32 n_threads = 19;

  // Enable tinydiarize speaker-turn detection.
  // @example true
  bool tdrz_enable = 20;

  // Regex used to suppress matching tokens.
  // @example "\\[MUSIC\\]"
  string suppress_regex = 21;

  // VAD pre-filtering

  // Enable VAD before transcription.
  // @example true
  bool vad_enabled = 22;

  // Path to the VAD model file.
  // @example "models/ggml-silero-v5.1.2.bin"
  string vad_model_path = 23;
}

message TranscribeResponse {
  repeated Segment segments = 1;
  string detected_language = 2;
  Timings timings = 3;
}

message Segment {
  int32 index = 1;
  int64 t0 = 2;                  // Start time (10 ms units, whisper convention)
  int64 t1 = 3;                  // End time
  string text = 4;
  bool speaker_turn_next = 5;    // tinydiarize flag
  float no_speech_prob = 6;
  repeated Token tokens = 7;
}

message Token {
  int32 id = 1;
  string text = 2;
  float p = 3;                   // Probability
  float plog = 4;                // Log probability
  int64 t0 = 5;                  // Token start time
  int64 t1 = 6;                  // Token end time
  int64 t_dtw = 7;               // DTW timestamp (experimental)
  float vlen = 8;                // Voice length
}

message Timings {
  float sample_ms = 1;
  float encode_ms = 2;
  float decode_ms = 3;
  float batchd_ms = 4;
  float prompt_ms = 5;
}

// --- DetectLanguage ---

message DetectLanguageRequest {
  // PCM float32 little-endian audio sampled at 16 kHz mono.
  // @required
  // @example "AAAAAA=="
  bytes audio = 1;

  // Path to the whisper model file on disk.
  // @required
  // @example "models/ggml-base.bin"
  string model_path = 2;

  // Start offset in milliseconds.
  // @example 0
  int32 offset_ms = 3;

  // Number of decoding threads. Use 0 for automatic selection.
  // @example 4
  int32 n_threads = 4;
}

message DetectLanguageResponse {
  string language = 1;
  repeated LanguageProb probs = 2;
}

message LanguageProb {
  string language = 1;
  float probability = 2;
}

// --- GetModelInfo ---

message GetModelInfoRequest {
  // Path to the whisper model file on disk.
  // @required
  // @example "models/ggml-base.bin"
  string model_path = 1;
}

message GetModelInfoResponse {
  string model_type = 1;         // "tiny", "base", "small", etc.
  bool multilingual = 2;
  int32 n_vocab = 3;
  int32 n_audio_ctx = 4;
  int32 n_audio_state = 5;
  int32 n_audio_head = 6;
  int32 n_audio_layer = 7;
  int32 n_text_ctx = 8;
  int32 n_text_state = 9;
  int32 n_text_head = 10;
  int32 n_text_layer = 11;
  int32 n_mels = 12;
  int32 ftype = 13;
}

// --- DetectVAD ---

message DetectVADRequest {
  // PCM float32 little-endian audio sampled at 16 kHz mono.
  // @required
  // @example "AAAAAA=="
  bytes audio = 1;

  // Path to the VAD model file on disk.
  // @required
  // @example "models/ggml-silero-v5.1.2.bin"
  string vad_model_path = 2;

  // Threshold used by the VAD detector.
  // @example 0.5
  float threshold = 3;

  // Minimum speech duration in milliseconds.
  // @example 250
  int32 min_speech_duration_ms = 4;

  // Minimum silence duration in milliseconds.
  // @example 200
  int32 min_silence_duration_ms = 5;

  // Maximum speech duration in seconds.
  // @example 30.0
  float max_speech_duration_s = 6;

  // Padding applied around detected speech in milliseconds.
  // @example 150
  int32 speech_pad_ms = 7;
}

message DetectVADResponse {
  bool speech_detected = 1;
  repeated VADSegment segments = 2;
}

message VADSegment {
  float t0 = 1;                  // Start time (seconds)
  float t1 = 2;                  // End time (seconds)
}

// --- GetVersion ---

message GetVersionRequest {}

message GetVersionResponse {
  string version = 1;
  string system_info = 2;
}
